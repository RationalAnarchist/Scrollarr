{% extends "base.html" %}

{% block title %}Events - Scrollarr{% endblock %}

{% block content %}
<div class="max-w-7xl mx-auto space-y-6">
    <div class="flex justify-between items-center mb-6">
        <h2 class="text-3xl font-bold tracking-tight text-white">Events</h2>
        <button onclick="loadEvents()" id="btn-refresh" class="px-4 py-2 bg-blue-600 text-white font-medium rounded hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-blue-500 disabled:opacity-50 transition-colors flex items-center">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 mr-2" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" />
            </svg>
            Refresh
        </button>
    </div>

    <!-- Error Banner -->
    <div id="error-banner" class="hidden bg-red-900 border border-red-800 text-white px-4 py-3 rounded relative mb-4" role="alert">
        <strong class="font-bold">Error!</strong>
        <span class="block sm:inline" id="error-message"></span>
    </div>

    <div class="bg-gray-900 border border-gray-800 rounded-lg overflow-hidden shadow-sm">
        <div class="overflow-x-auto">
            <table class="min-w-full divide-y divide-gray-800">
                <thead class="bg-gray-800">
                    <tr>
                        <th scope="col" class="px-6 py-4 text-left text-xs font-semibold text-gray-400 uppercase tracking-wider w-48">Timestamp</th>
                        <th scope="col" class="px-6 py-4 text-left text-xs font-semibold text-gray-400 uppercase tracking-wider w-24">Level</th>
                        <th scope="col" class="px-6 py-4 text-left text-xs font-semibold text-gray-400 uppercase tracking-wider w-48">Component</th>
                        <th scope="col" class="px-6 py-4 text-left text-xs font-semibold text-gray-400 uppercase tracking-wider">Message</th>
                    </tr>
                </thead>
                <tbody id="events-table-body" class="bg-gray-900 divide-y divide-gray-800 font-mono text-sm">
                    <tr id="loading-row">
                        <td colspan="4" class="px-6 py-8 text-center text-gray-500">
                            Loading events...
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
    function showError(msg) {
        const banner = document.getElementById('error-banner');
        document.getElementById('error-message').textContent = msg;
        banner.classList.remove('hidden');
        setTimeout(() => { banner.classList.add('hidden'); }, 5000);
    }

    function getLevelColor(level) {
        switch (level.toUpperCase()) {
            case 'ERROR': return 'text-red-400 bg-red-400/10 border border-red-400/20';
            case 'WARNING': return 'text-yellow-400 bg-yellow-400/10 border border-yellow-400/20';
            case 'INFO': return 'text-blue-400 bg-blue-400/10 border border-blue-400/20';
            case 'DEBUG': return 'text-gray-400 bg-gray-400/10 border border-gray-400/20';
            default: return 'text-gray-300';
        }
    }

    async function loadEvents() {
        const btn = document.getElementById('btn-refresh');
        btn.disabled = true;
        
        try {
            const response = await fetch('/api/events');
            if (!response.ok) throw new Error('Failed to fetch events');
            const data = await response.json();
            
            const tbody = document.getElementById('events-table-body');
            tbody.innerHTML = '';
            
            if (!data.events || data.events.length === 0) {
                tbody.innerHTML = `<tr><td colspan="4" class="px-6 py-8 text-center text-gray-500">No events found</td></tr>`;
                return;
            }
            
            data.events.forEach(event => {
                const tr = document.createElement('tr');
                tr.className = 'hover:bg-gray-800 transition-colors duration-150';
                
                tr.innerHTML = `
                    <td class="px-6 py-3 whitespace-nowrap text-gray-400">
                        ${event.timestamp}
                    </td>
                    <td class="px-6 py-3 whitespace-nowrap">
                        <span class="px-2 py-1 rounded text-xs ${getLevelColor(event.level)}">
                            ${event.level}
                        </span>
                    </td>
                    <td class="px-6 py-3 whitespace-nowrap text-gray-400 truncate max-w-xs">
                        ${event.component}
                    </td>
                    <td class="px-6 py-3 text-gray-300 break-words">
                        ${event.message}
                    </td>
                `;
                tbody.appendChild(tr);
            });
            
        } catch (e) {
            document.getElementById('events-table-body').innerHTML = `<tr><td colspan="4" class="px-6 py-8 text-center text-red-500">Error loading events</td></tr>`;
            showError(e.message);
        } finally {
            btn.disabled = false;
        }
    }

    document.addEventListener('DOMContentLoaded', loadEvents);
</script>
{% endblock %}
